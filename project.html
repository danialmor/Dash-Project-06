<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>پروژه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef3f7 0%, #d0dce8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 30px 30px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 18px;
            color: #1f556e;
            text-decoration: none;
            font-weight: 600;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            transition: 0.2s;
        }

        .back-link:hover {
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .project-name {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0b2a3b;
            background: rgba(255, 255, 255, 0.3);
            padding: 4px 24px;
            border-radius: 60px;
        }

        .view-counter {
            background: #1e3b4f;
            color: white;
            padding: 8px 22px;
            border-radius: 60px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .view-counter span {
            background: #ffd966;
            color: #1e3b4f;
            padding: 0 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .admin-toggle-btn {
            position: absolute;
            top: 18px;
            left: 22px;
            background: rgba(30, 59, 79, 0.1);
            border: 2px dashed rgba(30, 59, 79, 0.3);
            color: #1e3b4f;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
            z-index: 10;
            font-weight: 600;
        }

        .admin-toggle-btn:hover {
            background: rgba(30, 59, 79, 0.2);
            border-color: #1e3b4f;
        }

        .admin-toggle-btn.active {
            background: #1e3b4f;
            color: white;
            border-color: #1e3b4f;
        }

        .admin-panel {
            display: none;
            animation: fadeIn 0.3s ease;
            margin: 16px 0 20px 0;
        }

        .admin-panel.visible {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upload-section {
            background: rgba(235, 245, 250, 0.5);
            border-radius: 36px;
            padding: 20px 20px 12px;
            border: 2px dashed #3f6b7c;
            text-align: center;
        }

        .upload-label {
            display: inline-block;
            background: #1e3b4f;
            color: white;
            padding: 14px 40px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.1rem;
        }

        .upload-label:hover {
            background: #14303f;
            transform: scale(1.02);
        }

        .upload-label:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #fileInput {
            display: none;
        }

        .image-preview-container {
            margin: 18px auto 6px;
            max-width: 100%;
            border-radius: 28px;
            overflow: hidden;
            background: #eef4f9;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #bfd7e3;
            cursor: pointer;
            transition: 0.2s;
        }

        .image-preview-container:hover {
            background: #e3ecf3;
        }

        #previewImage {
            max-width: 100%;
            max-height: 420px;
            display: none;
            border-radius: 24px;
        }

        .fallback-text {
            color: #3f5f70;
            padding: 30px 20px;
            font-size: 1rem;
            opacity: 0.7;
        }

        .public-image-container {
            margin: 10px 0 16px 0;
            text-align: center;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.3);
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .public-image-container img {
            max-width: 100%;
            max-height: 400px;
            display: none;
            border-radius: 20px;
        }

        .public-image-container .no-image-text {
            color: #3f5f70;
            padding: 30px;
            font-size: 1rem;
            opacity: 0.5;
        }

        .public-image-container img.visible {
            display: block;
        }

        .delete-btn {
            margin-top: 12px;
            padding: 8px 24px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: none;
        }

        .delete-btn:hover {
            background: #a93226;
            transform: scale(1.02);
        }

        .delete-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-msg {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #1e7e34;
            opacity: 0;
            transition: 0.3s;
            text-align: center;
        }

        .status-msg.show {
            opacity: 1;
        }

        .status-msg.loading {
            color: #f39c12;
        }

        .status-msg.error {
            color: #c0392b;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e7ed;
            border-radius: 4px;
            margin: 8px 0;
            overflow: hidden;
            display: none;
        }

        .progress-bar .progress-fill {
            height: 100%;
            background: #1a6e3a;
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .progress-bar.active {
            display: block;
        }

        .footer-note {
            margin-top: 24px;
            text-align: center;
            color: #1e4b5e;
            opacity: 0.5;
            font-size: 0.8rem;
        }

        .secret-hint {
            text-align: center;
            margin-top: 4px;
            font-size: 0.7rem;
            color: #1e4b5e;
            opacity: 0.15;
            transition: 0.3s;
        }

        .secret-hint:hover {
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            .project-name { font-size: 1.6rem; }
            .card { padding: 20px 14px; }
            .admin-toggle-btn { 
                top: 12px;
                left: 12px;
                padding: 6px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">

        <button class="admin-toggle-btn" id="adminToggleBtn">🔒 مدیریت</button>

        <a href="index.html" class="back-link">⬅ بازگشت به لیست پروژه‌ها</a>

        <div class="project-header">
            <div class="project-name" id="projectName">پروژه</div>
            <div class="view-counter">
                👁️ بازدید <span id="viewCount">0</span>
            </div>
        </div>

        <div class="public-image-container" id="publicImageContainer">
            <img id="publicImage" src="" alt="نمودار پیشرفت" />
            <div class="no-image-text" id="noImageText">📷 عکسی برای این پروژه آپلود نشده است</div>
        </div>

        <div class="admin-panel" id="adminPanel">
            <div class="upload-section">
                <label for="fileInput" class="upload-label" id="uploadLabel">📤 آپلود نمودار پیشرفت</label>
                <input type="file" id="fileInput" accept="image/*" />
                <div class="image-preview-container" id="imagePreviewContainer">
                    <img id="previewImage" src="" alt="نمودار" />
                    <div class="fallback-text" id="fallbackText">⬆️ برای آپلود کلیک کنید</div>
                </div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <button class="delete-btn" id="deleteBtn">🗑️ حذف عکس</button>
                <p style="font-size: 0.8rem; color: #1d4b5e; margin-top: 4px; opacity: 0.7;">PNG, JPG, SVG · حداکثر ۱ مگابایت</p>
                <div class="status-msg" id="statusMsg"></div>
            </div>
        </div>

        <div class="footer-note">
            📌 عکس‌ها در خود ریپازیتوری گیت‌هاب ذخیره می‌شوند · 🔑 رمز مدیریت: 1405
        </div>
        <div class="secret-hint">💡 روی 🔒 مدیریت کلیک کنید یا کلید M را بزنید</div>
    </div>

    <script>
        (function() {
            // =========================================
            // 🔑 تنظیمات گیت‌هاب - اینجا رو پر کنید!
            // =========================================
            const GITHUB_TOKEN = 'YOUR_GITHUB_TOKEN';   // توکنی که از گیت‌هاب گرفتی
            const GITHUB_USERNAME = 'YOUR_USERNAME';    // اسم کاربری گیت‌هاب
            const GITHUB_REPO = 'YOUR_REPO';            // اسم ریپازیتوری
            const ADMIN_PASSWORD = '1405';

            // =========================================
            // دریافت نام پروژه
            // =========================================
            const params = new URLSearchParams(window.location.search);
            const projectName = params.get('name') || 'پروژه';
            document.getElementById('projectName').textContent = projectName;

            // =========================================
            // کلیدهای ذخیره‌سازی
            // =========================================
            const IMAGE_URL_KEY = 'projectImageUrl_' + projectName;
            const VIEW_KEY = 'projectView_' + projectName;

            // =========================================
            // شمارنده بازدید
            // =========================================
            let views = parseInt(localStorage.getItem(VIEW_KEY), 10) || 0;
            views += 1;
            localStorage.setItem(VIEW_KEY, views);
            document.getElementById('viewCount').textContent = views;

            // =========================================
            // المان‌ها
            // =========================================
            const adminToggleBtn = document.getElementById('adminToggleBtn');
            const adminPanel = document.getElementById('adminPanel');
            const fileInput = document.getElementById('fileInput');
            const previewImage = document.getElementById('previewImage');
            const fallbackText = document.getElementById('fallbackText');
            const deleteBtn = document.getElementById('deleteBtn');
            const previewContainer = document.getElementById('imagePreviewContainer');
            const statusMsg = document.getElementById('statusMsg');
            const uploadLabel = document.getElementById('uploadLabel');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');

            const publicImage = document.getElementById('publicImage');
            const noImageText = document.getElementById('noImageText');

            let isAdminMode = false;
            let isUploading = false;

            // =========================================
            // بارگذاری عکس از لینک ذخیره شده
            // =========================================
            function loadPublicImage() {
                const savedUrl = localStorage.getItem(IMAGE_URL_KEY);
                if (savedUrl && savedUrl.startsWith('http')) {
                    publicImage.src = savedUrl;
                    publicImage.className = 'visible';
                    noImageText.style.display = 'none';
                    
                    previewImage.src = savedUrl;
                    previewImage.style.display = 'block';
                    fallbackText.style.display = 'none';
                    deleteBtn.style.display = 'inline-block';
                } else {
                    publicImage.className = '';
                    publicImage.style.display = 'none';
                    noImageText.style.display = 'block';
                    
                    previewImage.style.display = 'none';
                    fallbackText.style.display = 'block';
                    deleteBtn.style.display = 'none';
                }
            }
            loadPublicImage();

            // =========================================
            // نمایش پیام
            // =========================================
            function showStatus(msg, type = 'success') {
                statusMsg.textContent = msg;
                statusMsg.className = 'status-msg show';
                if (type === 'loading') {
                    statusMsg.className = 'status-msg show loading';
                } else if (type === 'error') {
                    statusMsg.className = 'status-msg show error';
                } else {
                    statusMsg.className = 'status-msg show';
                    statusMsg.style.color = '#1a6e3a';
                }
                setTimeout(() => {
                    statusMsg.classList.remove('show');
                }, 5000);
            }

            // =========================================
            // 🚀 آپلود عکس به گیت‌هاب
            // =========================================
            async function uploadToGitHub(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    
                    reader.onload = async function(e) {
                        try {
                            // گرفتن Base64 (بدون header)
                            const base64 = e.target.result.split(',')[1];
                            
                            // ساخت اسم فایل: پروژه_زمان.extension
                            const extension = file.name.split('.').pop();
                            const filename = `${projectName}_${Date.now()}.${extension}`;
                            const path = `images/${filename}`;
                            
                            // درخواست به GitHub API
                            const response = await fetch(
                                `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${path}`,
                                {
                                    method: 'PUT',
                                    headers: {
                                        'Authorization': `token ${GITHUB_TOKEN}`,
                                        'Content-Type': 'application/json'
                                    },
                                    body: JSON.stringify({
                                        message: `آپلود عکس برای پروژه ${projectName}`,
                                        content: base64,
                                        branch: 'main'
                                    })
                                }
                            );
                            
                            if (!response.ok) {
                                const errorData = await response.json();
                                throw new Error(errorData.message || 'خطا در آپلود به گیت‌هاب');
                            }
                            
                            const data = await response.json();
                            
                            // لینک نهایی عکس (از طریق raw)
                            const imageUrl = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/${path}`;
                            resolve(imageUrl);
                            
                        } catch (error) {
                            reject(error);
                        }
                    };
                    
                    reader.onerror = function() {
                        reject(new Error('خطا در خواندن فایل'));
                    };
                    
                    reader.readAsDataURL(file);
                });
            }

            // =========================================
            // مدیریت آپلود فایل
            // =========================================
            fileInput.addEventListener('change', async function(e) {
                if (!isAdminMode) {
                    showStatus('⚠️ ابتدا وارد حالت مدیریت شوید.', 'error');
                    return;
                }

                if (isUploading) return;

                const file = e.target.files[0];
                if (!file) return;

                if (!file.type.startsWith('image/')) {
                    showStatus('❌ لطفاً فایل تصویری انتخاب کنید.', 'error');
                    fileInput.value = '';
                    return;
                }

                if (file.size > 1 * 1024 * 1024) {
                    showStatus('❌ حجم فایل نباید بیشتر از ۱ مگابایت باشد.', 'error');
                    fileInput.value = '';
                    return;
                }

                // بررسی تنظیمات گیت‌هاب
                if (GITHUB_TOKEN === 'YOUR_GITHUB_TOKEN' || 
                    GITHUB_USERNAME === 'YOUR_USERNAME' || 
                    GITHUB_REPO === 'YOUR_REPO') {
                    showStatus('⚠️ لطفاً تنظیمات گیت‌هاب را در کد کامل کنید.', 'error');
                    fileInput.value = '';
                    return;
                }

                isUploading = true;
                uploadLabel.disabled = true;
                deleteBtn.disabled = true;
                progressBar.classList.add('active');
                progressFill.style.width = '0%';
                
                // شبیه‌سازی پیشرفت (چون API پیشرفت نداره)
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 10;
                    if (progress >= 90) clearInterval(interval);
                    progressFill.style.width = Math.min(progress, 90) + '%';
                }, 300);
                
                showStatus('⏳ در حال آپلود عکس به گیت‌هاب...', 'loading');

                try {
                    const imageUrl = await uploadToGitHub(file);
                    
                    clearInterval(interval);
                    progressFill.style.width = '100%';
                    
                    // ذخیره لینک در localStorage
                    localStorage.setItem(IMAGE_URL_KEY, imageUrl);
                    
                    // آپدیت نمایش عمومی
                    publicImage.src = imageUrl;
                    publicImage.className = 'visible';
                    noImageText.style.display = 'none';
                    
                    // آپدیت پیش‌نمایش مدیریت
                    previewImage.src = imageUrl;
                    previewImage.style.display = 'block';
                    fallbackText.style.display = 'none';
                    deleteBtn.style.display = 'inline-block';
                    
                    showStatus('✅ عکس با موفقیت در گیت‌هاب ذخیره شد!', 'success');
                    
                } catch (error) {
                    clearInterval(interval);
                    showStatus('❌ خطا در آپلود: ' + error.message, 'error');
                    console.error('GitHub Upload Error:', error);
                } finally {
                    isUploading = false;
                    uploadLabel.disabled = false;
                    deleteBtn.disabled = false;
                    setTimeout(() => {
                        progressBar.classList.remove('active');
                        progressFill.style.width = '0%';
                    }, 1000);
                    fileInput.value = '';
                }
            });

            // =========================================
            // حذف عکس (فقط از localStorage)
            // =========================================
            deleteBtn.addEventListener('click', function() {
                if (!isAdminMode) {
                    showStatus('⚠️ ابتدا وارد حالت مدیریت شوید.', 'error');
                    return;
                }
                if (isUploading) return;
                
                if (confirm('آیا عکس این پروژه حذف شود؟ (فقط از نمایشگر حذف می‌شود)')) {
                    localStorage.removeItem(IMAGE_URL_KEY);
                    
                    publicImage.className = '';
                    publicImage.style.display = 'none';
                    noImageText.style.display = 'block';
                    
                    previewImage.style.display = 'none';
                    fallbackText.style.display = 'block';
                    deleteBtn.style.display = 'none';
                    
                    showStatus('🗑️ عکس از نمایشگر حذف شد.', 'success');
                }
            });

            // =========================================
            // مدیریت (رمز ورود)
            // =========================================
            function toggleAdmin() {
                if (isUploading) return;
                
                if (!isAdminMode) {
                    const password = prompt('🔑 لطفاً رمز مدیریت را وارد کنید:');
                    if (password === ADMIN_PASSWORD) {
                        isAdminMode = true;
                        adminPanel.classList.add('visible');
                        adminToggleBtn.textContent = '🔓 بستن مدیریت';
                        adminToggleBtn.classList.add('active');
                        showStatus('✅ وارد حالت مدیریت شدید.', 'success');
                    } else if (password !== null) {
                        showStatus('❌ رمز اشتباه است!', 'error');
                    }
                } else {
                    isAdminMode = false;
                    adminPanel.classList.remove('visible');
                    adminToggleBtn.textContent = '🔒 مدیریت';
                    adminToggleBtn.classList.remove('active');
                    showStatus('🔒 از حالت مدیریت خارج شدید.', 'success');
                }
            }

            adminToggleBtn.addEventListener('click', toggleAdmin);

            previewContainer.addEventListener('click', function() {
                if (isAdminMode && !isUploading) {
                    fileInput.click();
                }
            });

            document.addEventListener('keydown', function(e) {
                if ((e.key === 'm' || e.key === 'M') && !e.ctrlKey && !e.altKey && !e.metaKey) {
                    e.preventDefault();
                    toggleAdmin();
                }
            });

            document.getElementById('viewCount').addEventListener('dblclick', function() {
                if (confirm('بازدیدهای این پروژه ریست شوند؟')) {
                    localStorage.setItem(VIEW_KEY, '0');
                    document.getElementById('viewCount').textContent = '0';
                    showStatus('🔄 بازدیدها ریست شد.', 'success');
                }
            });

            // =========================================
            // هشدار درباره تنظیمات گیت‌هاب
            // =========================================
            if (GITHUB_TOKEN === 'YOUR_GITHUB_TOKEN' || 
                GITHUB_USERNAME === 'YOUR_USERNAME' || 
                GITHUB_REPO === 'YOUR_REPO') {
                console.warn('⚠️ لطفاً تنظیمات گیت‌هاب را در کد کامل کنید:');
                console.warn('   GITHUB_TOKEN, GITHUB_USERNAME, GITHUB_REPO');
            }

            console.log('📊 پروژه:', projectName);
            console.log('🔑 رمز مدیریت:', ADMIN_PASSWORD);
            console.log('📤 سرویس آپلود: GitHub API');
            console.log(`📁 مخزن: ${GITHUB_USERNAME}/${GITHUB_REPO}`);
        })();
    </script>
</body>
</html>
